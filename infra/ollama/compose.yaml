name: bonsai-ollama

services:
  ollama:
    build:
      context: .
      args:
        OLLAMA_IMAGE: ollama/ollama@sha256:6345fbc18bd73a1e16404be681dbc6fd291a027cab43ed541abe78c4c81051b0
    image: bonsai/ollama-cuda13:0.32.1
    container_name: ollama
    restart: unless-stopped
    gpus: all
    security_opt:
      - apparmor=bonsai-ollama
    ports:
      - "11434:11434"
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
      OLLAMA_LLM_LIBRARY: cuda_v13
      OLLAMA_VULKAN: "0"
      GGML_VK_VISIBLE_DEVICES: "-1"
      OLLAMA_FLASH_ATTENTION: "1"
      OLLAMA_KV_CACHE_TYPE: q8_0
      OLLAMA_NUM_PARALLEL: "1"
      OLLAMA_MAX_LOADED_MODELS: "1"
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    volumes:
      - /var/lib/docker/ollama:/root/.ollama
      # /root/.ollama/models is an existing absolute symlink into this path.
      - /var/lib/docker/shared_models/ollama:/var/lib/docker/shared_models/ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
